<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferhat AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="status">
        <div class="dot"></div>
        AI Online
    </div>

    <div class="logo">
        FA
    </div>

    <h1>Ferhat AI</h1>
    <p class="subtitle">
        Hayal et, oluştur, yönet.
    </p>

    <div class="welcome">
        <h2>Merhaba Ferhat 👋</h2>
        <p>
            Uygulama, web sitesi, oyun ve projelerini
            yapay zekâ desteğiyle oluştur.
        </p>
    </div>

    <div class="cards">

        <div class="card">
            <div class="icon">📱</div>
            <h3>Uygulama</h3>
            <p>Android ve iOS projeleri</p>
        </div>

        <div class="card">
            <div class="icon">🎮</div>
            <h3>Oyun</h3>
            <p>2D ve 3D oyunlar</p>
        </div>

        <div class="card">
            <div class="icon">🌐</div>
            <h3>Web Site</h3>
            <p>Modern web projeleri</p>
        </div>

        <div class="card">
            <div class="icon">🤖</div>
            <h3>AI Asistan</h3>
            <p>Akıllı yardım sistemi</p>
        </div>

    </div>

    <div class="chat">

        <input
        type="text"
        placeholder="Ne oluşturmak istiyorsun?">

        <button>
            Gönder
        </button>

    </div>

</div>

</body>
</html>
